<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Knote - Materia Medica Game</title>

    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&family=Pacifico&family=Sacramento&display=swap"
        rel="stylesheet">

    <style>
        body {
            font-family: 'Nunito', sans-serif;
            background: linear-gradient(135deg, #AEE2FF 0%, #E6F4FF 100%);
            margin: 0;
            overflow: hidden;
        }

        .font-handwriting {
            font-family: 'Sacramento', cursive;
        }

        /* 3D Card Flip Animations */
        .perspective-1000 {
            perspective: 1000px;
        }

        .transform-style-3d {
            transform-style: preserve-3d;
        }

        .backface-hidden {
            backface-visibility: hidden;
        }

        .rotate-y-180 {
            transform: rotateY(180deg);
        }

        /* Enhanced Cloud Shapes */
        .cloud {
            background: white;
            border-radius: 100px;
            position: absolute;
            opacity: 0.8;
            filter: drop-shadow(0 4px 6px rgba(0, 0, 0, 0.05));
        }

        .cloud:after,
        .cloud:before {
            content: '';
            position: absolute;
            background: white;
            z-index: -1;
        }

        .cloud-1 {
            width: 200px;
            height: 80px;
        }

        .cloud-1:after {
            width: 80px;
            height: 80px;
            top: -40px;
            left: 30px;
            border-radius: 50%;
        }

        .cloud-1:before {
            width: 100px;
            height: 100px;
            top: -50px;
            right: 30px;
            border-radius: 50%;
        }

        .cloud-2 {
            width: 300px;
            height: 100px;
        }

        .cloud-2:after {
            width: 100px;
            height: 100px;
            top: -50px;
            left: 50px;
            border-radius: 50%;
        }

        .cloud-2:before {
            width: 140px;
            height: 140px;
            top: -70px;
            right: 50px;
            border-radius: 50%;
        }

        /* Animations */
        @keyframes slideUp {
            from {
                transform: translateY(50px);
                opacity: 0;
            }

            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .animate-slide-up {
            animation: slideUp 0.5s ease-out forwards;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        .animate-fade-in {
            animation: fadeIn 0.5s ease-in forwards;
        }

        @keyframes float {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-10px);
            }
        }

        .animate-float {
            animation: float 3s ease-in-out infinite;
        }

        /* Confetti */
        .confetti {
            position: absolute;
            width: 10px;
            height: 10px;
            background-color: #f00;
            animation: fall linear forwards;
        }

        @keyframes fall {
            to {
                transform: translateY(100vh) rotate(720deg);
            }
        }
    </style>
</head>

<body>

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- AUDIO MANAGER ---
        const playSound = (type) => {
            const AudioContext = window.AudioContext || window.webkitAudioContext;
            if (!AudioContext) return;

            const ctx = new AudioContext();
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();

            osc.connect(gain);
            gain.connect(ctx.destination);

            const now = ctx.currentTime;

            if (type === 'flip') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(400, now);
                gain.gain.setValueAtTime(0.05, now);
                gain.gain.exponentialRampToValueAtTime(0.001, now + 0.1);
                osc.start(now);
                osc.stop(now + 0.1);
            } else if (type === 'match') {
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(600, now);
                osc.frequency.exponentialRampToValueAtTime(1200, now + 0.1);
                gain.gain.setValueAtTime(0.1, now);
                gain.gain.exponentialRampToValueAtTime(0.001, now + 0.3);
                osc.start(now);
                osc.stop(now + 0.3);
            } else if (type === 'win') {
                // Simple arpeggio
                [523.25, 659.25, 783.99, 1046.50].forEach((freq, i) => {
                    const osc2 = ctx.createOscillator();
                    const gain2 = ctx.createGain();
                    osc2.connect(gain2);
                    gain2.connect(ctx.destination);
                    osc2.frequency.value = freq;
                    gain2.gain.setValueAtTime(0.1, now + i * 0.1);
                    gain2.gain.exponentialRampToValueAtTime(0.001, now + i * 0.1 + 0.4);
                    osc2.start(now + i * 0.1);
                    osc2.stop(now + i * 0.1 + 0.4);
                });
            }
        };

        // --- ICONS ---
        const IconMenu = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>;
        const IconLock = () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>;
        const IconCheck = () => <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>;
        const IconArrowRight = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>;
        const IconStar = () => <svg xmlns="http://www.w3.org/2000/svg" width="100%" height="100%" viewBox="0 0 24 24" fill="currentColor" stroke="none"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon></svg>;

        // --- DATA ---
        const REMEDY_LIST = [
            { id: 1, name: 'Cina', locked: false },
            { id: 2, name: 'Bryonia Alba', locked: true },
            { id: 3, name: 'Baryta carb', locked: true },
            { id: 4, name: 'Calcarea carb', locked: true },
            { id: 5, name: 'Calendula', locked: true },
            { id: 6, name: 'Hypericum', locked: true },
            { id: 7, name: 'Ledum Pal', locked: true },
            { id: 8, name: 'Natrum Mur', locked: true },
            { id: 9, name: 'Rhus Tox', locked: true },
            { id: 10, name: 'Ruta', locked: true },
            { id: 11, name: 'Silicea', locked: true },
            { id: 12, name: 'Sulphur', locked: true },
            { id: 13, name: 'Symphytum', locked: true },
            { id: 14, name: 'Colchicum', locked: true },
            { id: 15, name: 'Aconite nap', locked: true },
            { id: 16, name: 'Aloes soc', locked: true },
            { id: 17, name: 'Colocynth', locked: true },
            { id: 18, name: 'Dioscorea', locked: true },
            { id: 19, name: 'Apis mel', locked: true },
            { id: 20, name: 'Arnica Montana', locked: true },
        ];

        const CINA_DATA = [
            { id: 1, text: "Worm Remedy", emoji: "🐛" },
            { id: 2, text: "Desire for Sweets", emoji: "🍫" },
            { id: 3, text: "Boring of Nose", emoji: "👃" },
            { id: 4, text: "Redness of Cheeks", emoji: "😳" },
            { id: 5, text: "Canine Hunger", emoji: "🍗" },
            { id: 6, text: "Colicky Pain", emoji: "🤢" },
        ];

        // --- COMPONENT: CONFETTI ---
        const Confetti = () => {
            const [particles, setParticles] = useState([]);

            useEffect(() => {
                const colors = ['#FF5733', '#33FF57', '#3357FF', '#F333FF', '#FF33A8'];
                const newParticles = Array.from({ length: 50 }).map((_, i) => ({
                    id: i,
                    left: Math.random() * 100 + '%',
                    animationDuration: Math.random() * 3 + 2 + 's',
                    backgroundColor: colors[Math.floor(Math.random() * colors.length)],
                    delay: Math.random() * 2 + 's'
                }));
                setParticles(newParticles);
            }, []);

            return (
                <div className="absolute inset-0 overflow-hidden pointer-events-none z-50">
                    {particles.map(p => (
                        <div
                            key={p.id}
                            className="confetti"
                            style={{
                                left: p.left,
                                top: '-20px',
                                animationDuration: p.animationDuration,
                                animationDelay: p.delay,
                                backgroundColor: p.backgroundColor
                            }}
                        />
                    ))}
                </div>
            );
        };

        // --- COMPONENT: CARD ---
        const Card = ({ card, handleChoice, flipped, disabled }) => {
            const handleClick = () => {
                if (!disabled && !flipped) {
                    playSound('flip');
                    handleChoice(card);
                }
            };

            return (
                <div className="relative w-20 h-24 sm:w-24 sm:h-32 cursor-pointer perspective-1000" onClick={handleClick}>
                    <div className={`w-full h-full transition-transform duration-500 transform-style-3d ${flipped ? 'rotate-y-180' : ''}`}>

                        {/* Front (Red Backing) */}
                        <div className="absolute w-full h-full backface-hidden border-2 border-white rounded-lg shadow-lg bg-white flex items-center justify-center overflow-hidden">
                            <div className="w-full h-full bg-gradient-to-br from-red-400 to-red-600 relative">
                                <div className="absolute inset-0 border-4 border-white/30 m-1 rounded"></div>
                                <div className="w-full h-full flex items-center justify-center text-white font-bold text-3xl skew-y-12 font-serif opacity-90">
                                    K
                                </div>
                            </div>
                        </div>

                        {/* Back (Content) */}
                        <div className="absolute w-full h-full backface-hidden rotate-y-180 bg-white border-4 border-blue-200 rounded-lg shadow-xl flex flex-col items-center justify-center p-1 text-center">
                            {card.type === 'emoji' ? (
                                <div className="text-4xl animate-float">{card.content}</div>
                            ) : (
                                <div className="text-[10px] sm:text-xs font-bold text-blue-900 uppercase leading-tight">{card.content}</div>
                            )}
                        </div>

                    </div>
                </div>
            );
        };

        // --- VIEWS ---

        // 1. HOME
        const HomeView = ({ setView }) => (
            <div className="flex flex-col items-center justify-center h-full space-y-8 animate-fade-in relative z-20">
                <div className="bg-white p-8 rounded-full shadow-2xl flex flex-col items-center justify-center w-64 h-64 z-10 border-4 border-blue-50 relative overflow-hidden group">
                    <div className="absolute inset-0 bg-blue-50 opacity-0 group-hover:opacity-100 transition-opacity duration-500"></div>
                    <h1 className="text-6xl font-serif text-red-500 font-bold relative z-10">K<span className="text-black font-handwriting font-normal">note</span></h1>
                    <p className="text-sm text-gray-600 mt-2 font-bold tracking-wide relative z-10">A materia medica game</p>
                </div>
                <button
                    onClick={() => {
                        playSound('flip');
                        setView('remedies');
                    }}
                    className="bg-rose-500 text-white px-12 py-4 rounded-full text-xl font-bold shadow-lg hover:bg-rose-600 transition transform hover:scale-105 z-10 tracking-widest border-b-4 border-rose-700 active:border-b-0 active:translate-y-1">
                    PLAY
                </button>
            </div>
        );

        // 2. REMEDIES
        const RemedyListView = ({ setView, setSelectedRemedy }) => (
            <div className="w-full max-w-md p-4 z-20 animate-slide-up h-full flex flex-col">
                <div className="flex items-center justify-between mb-6 pt-4">
                    <button onClick={() => setView('home')} className="text-red-500 hover:scale-110 transition"><IconMenu /></button>
                    <h2 className="text-3xl font-serif text-black">K<span className="font-handwriting">note</span></h2>
                    <div className="w-6"></div>
                </div>

                <h3 className="text-center text-gray-800 font-bold text-xl mb-4 tracking-wider">REMEDIES</h3>

                <div className="bg-white/60 backdrop-blur-sm rounded-3xl p-6 shadow-xl space-y-4 overflow-y-auto max-h-[70vh]">
                    {REMEDY_LIST.map((remedy) => (
                        <div
                            key={remedy.id}
                            onClick={() => {
                                if (!remedy.locked) {
                                    playSound('flip');
                                    setSelectedRemedy(remedy.name);
                                    setView('difficulty');
                                }
                            }}
                            className={`flex items-center justify-between p-4 rounded-xl cursor-pointer transition transform hover:scale-[1.02] ${remedy.locked ? 'bg-blue-100/50 opacity-60' : 'bg-white hover:bg-blue-50 border-2 border-blue-200 shadow-sm'}`}
                        >
                            <span className="font-bold text-blue-900 capitalize text-lg">{remedy.id}) {remedy.name}</span>
                            {remedy.locked ? (
                                <span className="text-blue-400"><IconLock /></span>
                            ) : (
                                <div className="bg-blue-500 text-white rounded-full p-1 shadow"><IconCheck /></div>
                            )}
                        </div>
                    ))}
                </div>
            </div>
        );

        // 3. DIFFICULTY
        const DifficultyView = ({ setView, selectedRemedy, shuffleCards }) => (
            <div className="w-full max-w-md p-4 z-20 flex flex-col items-center animate-slide-up pt-10">
                <h2 className="text-4xl font-serif text-red-500 mb-2">K<span className="text-black font-handwriting">note</span></h2>
                <h3 className="text-2xl font-bold text-green-600 uppercase tracking-widest mb-12 drop-shadow-sm">{selectedRemedy}</h3>

                <div className="space-y-6 w-full px-8">
                    {['EASY', 'MEDIUM', 'HARD'].map((level) => (
                        <button
                            key={level}
                            onClick={() => {
                                playSound('flip');
                                shuffleCards();
                                setView('game');
                            }}
                            className="w-full bg-blue-600 text-white py-5 rounded-2xl font-bold text-lg shadow-xl hover:bg-blue-700 border-b-4 border-blue-800 transition transform hover:-translate-y-1 active:translate-y-0 active:border-b-0"
                        >
                            {level}
                        </button>
                    ))}
                </div>
                <button onClick={() => setView('remedies')} className="mt-12 text-gray-600 underline hover:text-gray-800">Select different remedy</button>
            </div>
        );

        // 4. GAME
        const GameView = ({ setView, selectedRemedy, cards, handleChoice, choiceOne, choiceTwo, disabled, matches, time, formatTime }) => (
            <div className="w-full h-full flex flex-col p-4 z-20 animate-fade-in">
                <div className="flex justify-between items-center mb-2 pt-2">
                    <button onClick={() => setView('difficulty')} className="text-red-500 bg-white rounded-full p-2 shadow hover:scale-110 transition"><IconMenu /></button>
                    <div className="flex flex-col items-center bg-white/50 px-4 py-1 rounded-lg backdrop-blur-sm">
                        <h2 className="font-serif text-xl text-red-500 leading-none">K<span className="text-black font-handwriting">note</span></h2>
                        <span className="text-green-700 font-bold text-[10px] tracking-widest uppercase">{selectedRemedy} - MEDIUM</span>
                    </div>
                    <div className="w-10"></div>
                </div>

                {/* Grid */}
                <div className="flex-1 flex items-center justify-center">
                    <div className="grid grid-cols-4 gap-2 sm:gap-3">
                        {cards.map(card => (
                            <Card
                                key={card.id}
                                card={card}
                                handleChoice={handleChoice}
                                flipped={card === choiceOne || card === choiceTwo || card.matched}
                                disabled={disabled}
                            />
                        ))}
                    </div>
                </div>

                {/* HUD */}
                <div className="mt-2 mb-4 flex items-center justify-between bg-white p-3 rounded-2xl shadow-xl mx-2 border-b-4 border-gray-200">
                    <div className="flex gap-1.5">
                        {[...Array(6)].map((_, i) => (
                            <div key={i} className={`h-3 w-3 rounded-full transition-all duration-500 ${i < matches ? 'bg-green-400 shadow-[0_0_8px_rgba(74,222,128,1)] scale-110' : 'bg-gray-200'}`}></div>
                        ))}
                    </div>
                    <div className="flex items-center text-red-500 font-bold bg-red-50 rounded-lg px-3 py-1 border border-red-100">
                        <span className="mr-1 text-lg">⏱</span> {formatTime(time)}
                    </div>
                </div>
            </div>
        );

        // 5. RECAP
        const RecapView = ({ setView, selectedRemedy, recapIndex, setRecapIndex }) => {
            const currentSymptom = CINA_DATA[recapIndex];

            const nextSlide = () => {
                playSound('flip');
                if (recapIndex < CINA_DATA.length - 1) {
                    setRecapIndex(prev => prev + 1);
                } else {
                    setRecapIndex(0);
                    setView('remedies');
                }
            };

            return (
                <div className="w-full h-full flex flex-col items-center p-6 z-20 animate-slide-up justify-center relative">
                    <Confetti />

                    <div className="absolute top-10 text-center">
                        <h2 className="font-serif text-3xl text-red-500">K<span className="text-black font-handwriting">note</span></h2>
                        <h1 className="text-5xl font-bold text-green-600 uppercase mt-2 drop-shadow-sm">{selectedRemedy}</h1>
                        <div className="bg-blue-100 text-blue-800 px-3 py-1 rounded-full text-xs font-bold tracking-widest mt-2 inline-block">SYMPTOMS COLLECTED</div>
                    </div>

                    {/* Flashcard */}
                    <div className="bg-white p-4 rounded-2xl shadow-2xl w-64 aspect-[3/4] flex flex-col items-center border-8 border-white ring-4 ring-blue-100 mt-10 mb-8 relative transform rotate-1 transition-transform hover:rotate-0">
                        <div className="bg-amber-50 w-full flex-1 rounded-xl border-2 border-gray-100 flex items-center justify-center text-9xl shadow-inner relative overflow-hidden">
                            <div className="absolute inset-0 bg-[radial-gradient(circle_at_center,_var(--tw-gradient-stops))] from-white to-transparent opacity-50"></div>
                            <span className="relative z-10 animate-fade-in">{currentSymptom.emoji}</span>
                        </div>
                        <div className="w-full mt-4 min-h-[60px] flex items-center justify-center">
                            <h3 className="text-blue-900 font-bold text-center text-xl leading-tight font-handwriting text-3xl">
                                {currentSymptom.text}
                            </h3>
                        </div>
                    </div>

                    <button
                        onClick={nextSlide}
                        className="bg-blue-500 text-white px-8 py-3 rounded-full font-bold text-xl shadow-xl hover:bg-blue-600 flex items-center gap-2 border-b-4 border-blue-700 active:border-b-0 active:translate-y-1 transition-all z-50">
                        NEXT <IconArrowRight />
                    </button>
                </div>
            );
        };

        // --- MAIN APP ---
        const App = () => {
            const [view, setView] = useState('home');
            const [selectedRemedy, setSelectedRemedy] = useState(null);
            const [cards, setCards] = useState([]);
            const [turns, setTurns] = useState(0);
            const [choiceOne, setChoiceOne] = useState(null);
            const [choiceTwo, setChoiceTwo] = useState(null);
            const [disabled, setDisabled] = useState(false);
            const [matches, setMatches] = useState(0);
            const [time, setTime] = useState(0);
            const [recapIndex, setRecapIndex] = useState(0);

            // Shuffle Logic
            const shuffleCards = () => {
                const shuffledCards = [...CINA_DATA, ...CINA_DATA]
                    .map((item, index) => {
                        const isText = index < CINA_DATA.length;
                        return {
                            item_id: item.id,
                            content: isText ? item.text : item.emoji,
                            type: isText ? 'text' : 'emoji',
                            id: Math.random(),
                            matched: false
                        };
                    })
                    .sort(() => Math.random() - 0.5);

                setChoiceOne(null);
                setChoiceTwo(null);
                setCards(shuffledCards);
                setTurns(0);
                setMatches(0);
                setTime(0);
            };

            // Game Loop
            const handleChoice = (card) => {
                choiceOne ? setChoiceTwo(card) : setChoiceOne(card);
            };

            useEffect(() => {
                if (choiceOne && choiceTwo) {
                    setDisabled(true);
                    if (choiceOne.item_id === choiceTwo.item_id) {
                        playSound('match');
                        setCards(prevCards => {
                            return prevCards.map(card => {
                                if (card.item_id === choiceOne.item_id) {
                                    return { ...card, matched: true };
                                }
                                return card;
                            });
                        });
                        setMatches(prev => prev + 1);
                        resetTurn();
                    } else {
                        setTimeout(() => resetTurn(), 1000);
                    }
                }
            }, [choiceOne, choiceTwo]);

            const resetTurn = () => {
                setChoiceOne(null);
                setChoiceTwo(null);
                setTurns(prevTurns => prevTurns + 1);
                setDisabled(false);
            };

            useEffect(() => {
                if (matches === CINA_DATA.length && matches > 0) {
                    playSound('win');
                    setTimeout(() => setView('recap'), 1500);
                }
            }, [matches]);

            useEffect(() => {
                let interval;
                if (view === 'game' && matches < CINA_DATA.length) {
                    interval = setInterval(() => {
                        setTime(prevTime => prevTime + 1);
                    }, 1000);
                }
                return () => clearInterval(interval);
            }, [view, matches]);

            const formatTime = (seconds) => {
                const mins = Math.floor(seconds / 60);
                const secs = seconds % 60;
                return `${mins < 10 ? '0' : ''}${mins}:${secs < 10 ? '0' : ''}${secs}`;
            };

            // --- LAYOUT RENDER ---
            return (
                <div className="min-h-screen w-full flex items-center justify-center relative bg-[#AEE2FF] overflow-hidden">

                    {/* CSS Clouds Background */}
                    <div className="cloud cloud-1 -bottom-12 -left-12 z-0 opacity-50"></div>
                    <div className="cloud cloud-2 -bottom-20 left-1/3 z-0 opacity-60"></div>
                    <div className="cloud cloud-1 -bottom-10 -right-10 z-0 opacity-50"></div>

                    {/* Floating Clouds Top */}
                    <div className="cloud cloud-1 top-20 -left-20 z-0 opacity-30 animate-float" style={{ animationDuration: '8s' }}></div>
                    <div className="cloud cloud-2 top-40 -right-20 z-0 opacity-30 animate-float" style={{ animationDuration: '12s' }}></div>

                    {/* Star Decoration */}
                    <div className="absolute top-20 right-10 w-48 h-48 text-blue-400 opacity-20 z-0 hidden sm:block animate-pulse">
                        <IconStar />
                    </div>

                    {/* Mobile Frame Container */}
                    <div className="w-full max-w-[420px] h-[100dvh] relative z-10 flex flex-col overflow-hidden shadow-2xl sm:rounded-3xl sm:h-[850px] sm:max-h-[90vh] bg-gradient-to-b from-[#AEE2FF] to-[#E6F4FF] sm:border-8 sm:border-white">
                        {view === 'home' && <HomeView setView={setView} />}
                        {view === 'remedies' && <RemedyListView setView={setView} setSelectedRemedy={setSelectedRemedy} />}
                        {view === 'difficulty' && <DifficultyView setView={setView} selectedRemedy={selectedRemedy} shuffleCards={shuffleCards} />}
                        {view === 'game' && <GameView
                            setView={setView}
                            selectedRemedy={selectedRemedy}
                            cards={cards}
                            handleChoice={handleChoice}
                            choiceOne={choiceOne}
                            choiceTwo={choiceTwo}
                            disabled={disabled}
                            matches={matches}
                            time={time}
                            formatTime={formatTime}
                        />}
                        {view === 'recap' && <RecapView setView={setView} selectedRemedy={selectedRemedy} recapIndex={recapIndex} setRecapIndex={setRecapIndex} />}
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
